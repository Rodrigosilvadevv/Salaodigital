workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: | 
          npm install
      - name: Build Web Project
        script: | 
          npm run build
      - name: Capacitor Sync and Pods
        script: | 
          npx cap sync ios
          cd ios/App && pod install
      - name: Build iOS with Xcode
        script: | 
          # Comando simplificado para rodar na nuvem
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Release archive -archivePath ios/App/App.xcarchive CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/App/App.xcarchive
      - /tmp/xcodebuild_logs/*.log