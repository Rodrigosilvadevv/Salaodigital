workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: | 
          npm install
      - name: Build Web Project
        script: | 
          npm run build
      - name: Capacitor Sync
        script: | 
          npx cap sync ios
      - name: Build iOS with Xcode
        script: | 
          npx cap build ios --build-config=Release
    artifacts:
      - ios/App/App.xcarchive
      - /tmp/xcodebuild_logs/*.log